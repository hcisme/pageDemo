<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>图片放大镜选区工具</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div class="controls">
    <input type="file" id="fileInput" accept="image/*">
  </div>
  <br>

  <div class="row">
    <div class="source-wrap" id="sourceWrap">
      <img id="sourceImg" src="" alt="选择图片后显示" draggable="false">
      <div class="selection" id="selection"></div>
    </div>

    <div class="preview-side">
      <div class="preview-box">
        <canvas id="previewCanvas" width="300" height="300"></canvas>
      </div>
      <button id="updateBtn">输出预览图</button>
    </div>
  </div>

  <script src="./index.js"></script>
</body>

</html>
